<html>
  <head>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <!--
       - N - B O D Y  O S C I L L A T O R
    <div class="canvasWrapper" id="oscillatorCanvasWrapper"  style="aspect-ratio: 19 / 12;">
      <canvas id="oscillatorCanvas" class="applicationCanvas" style="aspect-ratio: 19 / 12;"></canvas>
      <div class="overlayText" id="oscillatorOverlay">Click to start the animation!</div>
    </div>

    <div id="oscillatorPlot" style="margin:auto;"></div>
    <script type="module" src="scenes/n_body_oscillator.js"></script>
     -->
    <!--
       - V I B R A T I N G  M E M B R A N E
       -->
    <div class="canvasWrapper" id="membraneCanvasWrapper">
      <canvas class="applicationCanvas" id="membraneCanvas"></canvas><br/>
    </div>
    <div class="buttonRow">
      <label for="colorMapSelect">Color map:</label>
      <select name="colorMaps" id="colorMapSelect">
        <option value="seismic">Seismic</option>
        <option value="viridis">Viridis</option>
        <option value="jet">Jet</option>
        <option value="inferno">Inferno</option>
        <option value="RdYlBu">RdYlBu</option>
        <option value="water">Water</option>
        <option value="water alternative">Water alternative</option>
        <option value="gradient">Gradient</option>
      </select>
      <label for="showContours">Contours</label>
      <input type="checkbox" name="showContours" id="showContours" checked="checked" />
    </div>
    <div class="buttonRow">
      Mode-x :
      <button id="x1" value="1">1</button>
      <button id="x2" value="2">2</button>
      <button id="x3" value="3">3</button>
      <button id="x4" value="4">4</button>
      <button id="x5" value="5">5</button>
    </div>
    <div class="buttonRow">
      Mode-y :
      <button id="y1" value="1">1</button>
      <button id="y2" value="2">2</button>
      <button id="y3" value="3">3</button>
      <button id="y4" value="4">4</button>
      <button id="y5" value="5">5</button>
    </div>
    <script type="module" src="scenes/vibrating_membrane.js"></script>
  </body>
</html>
