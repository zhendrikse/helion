<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../docs/src/assets/styles.css" />
    <title>Testing optics</title>
</head>
<body>
    <!--
       - F R A U N H O F E R   D I F F R A C T I O N
       -->
    <div id="fraunhoferContainer"></div>

    <div class="buttonRow">
        <label for="diameterSlider">Size:
            <input type="range" id="diameterSlider" min="20" max="200" value="200"/>
            <span id="diameterValue">200</span> µm
        </label>
    </div>
    <div class="buttonRow">
        <label for="wavelengthSlider">Color:
            <input type="range" id="wavelengthSlider" min="380" max="700" value="500"/>
            &nbsp;<span id="wavelengthProbe">&nbsp;&nbsp;&nbsp;&nbsp;</span>&nbsp;
            <span id="wavelengthValue">500</span>&nbsp;nm
        </label>
        <label for="laserColor">🎨 <input type="checkbox" id="laserColor" checked/></label>
    </div>

    <script type="module" src="scenes/fraunhofer_diffraction.js"></script>
</body>
</html>
