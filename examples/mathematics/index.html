    <!--

       -->
    <div class="canvasWrapper" id="realSurfacesCanvasWrapper">
        <canvas class="applicationCanvas" id="realSurfacesCanvas" width="500" height="500"></canvas>
    </div>
    <div class="buttonRow">
        <label for="surfaceSelect">Surface:</label>
        <select name="surfaceSelect" id="surfaceSelect">
            <option value="Ripple">Ripple</option>
            <option value="Peak">Peak</option>
            <option value="Ricker">Ricker wavelet</option>
            <option value="Polynomial">Polynomial</option>
        </select>
    </div>
    <div class="buttonRow">
        <label for="colorMapSelect">Color map:</label>
        <select name="colorMaps" id="colorMapSelect">
            <option value="gradient">Gradient</option>
            <option value="seismic">Seismic</option>
            <option value="viridis">Viridis</option>
            <option value="jet">Jet</option>
            <option value="inferno">Inferno</option>
            <option value="RdYlBu">RdYlBu</option>
            <option value="water">Water</option>
            <option value="water alternative">Water alternative</option>
            <option value="uniform">Uniform</option>
        </select>
    </div>
    <div class="buttonRow">
        <label for="showContours">Contours</label>
        <input type="checkbox" name="showContours" id="showContours" checked="checked" />
        <label for="showWireframe">Wireframe</label>
        <input type="checkbox" name="showWireframe" id="showWireframe" />
        <label for="animate">Animate</label>
        <input type="checkbox" name="animate" id="animate" checked />
    </div>
    <script type="module" src="scenes/real_surfaces.js"></script>
