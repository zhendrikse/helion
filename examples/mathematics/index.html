<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../docs/src/assets/styles.css" />
    <title>Testing mathematics</title>
</head>
<body>
    <!--
       - S P H E R I C A L   H A R M O N I C S
    <div class="canvasWrapper" id="sphericalHarmonicsCanvasWrapper">
        <canvas class="applicationCanvas" id="sphericalHarmonicsCanvas" width="500" height="500"></canvas>
    </div>
    <script type="module" src="scenes/spherical_harmonics.js"></script>
       -->
    <!--
       - R E A L   S U R F A C E S
    <div id="realSurfacesContainer"></div>
    <script type="module" src="scenes/real_surfaces.js"></script>
       -->
    <!--
       - P A R A M E T R I C   S U R F A C E S
    <div id="parametricSurfacesContainer"></div>
    <script type="module" src="scenes/parametric_surfaces.js"></script>
       -->
    <!--
       - F O U R I E R   T R A N S F O R M
       -->
    <div class="canvasWrapper" id="waveCanvasWrapper">
        <canvas class="applicationCanvas" id="waveCanvas"></canvas>
    </div>
    <script type="module" src="scenes/fourier_transform.js"></script>
    <div class="canvasWrapper" id="fourierTransformCanvasWrapper">
        <canvas id="fourierTransformCanvas" class="applicationCanvas"></canvas>
    </div>

    <div class="buttonRow">
        <label for="squareButton">🟩 Square</label>
        <input id="squareButton" name="apertureType" type="radio" value="square"/>
        <label for="circleButton">🟢 Circle </label>
        <input id="circleButton" name="apertureType" type="radio" value="circular" checked/>
    </div>
    <div class="buttonRow">
        <label for="diameterSlider">Size:</label>
        <input type="range" id="diameterSlider" min="20" max="50" value="30" step="any"/>
        <span id="diameterValue">30</span> pixels
        <label for="phaseColor">🎨 Phase</label>
        <input id="phaseColor" type="checkbox" checked/>
    </div>
    <script type="module" src="scenes/fourier_transform.js"></script>
</body>
</html>
